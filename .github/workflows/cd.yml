name: CD

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: ditto-server
  ECR_ALLOY_REPOSITORY: ditto-alloy
  ECS_CLUSTER: ditto-cluster
  ECS_SERVICE: ditto-api-service

jobs:
  deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # Public ECR 인증 토큰은 us-east-1에서만 발행 가능합니다.
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr-public.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Build and push Alloy image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr-public.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # .aws/alloy 경로를 사용한 빌드
          docker build -t $ECR_REGISTRY/$ECR_ALLOY_REPOSITORY:$IMAGE_TAG .aws/alloy
          docker tag $ECR_REGISTRY/$ECR_ALLOY_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_ALLOY_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_ALLOY_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_ALLOY_REPOSITORY:latest

      - name: Force new deployment
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment --region $AWS_REGION

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable --cluster $ECS_CLUSTER --services $ECS_SERVICE --region $AWS_REGION

      - name: Get new task public IP
        id: get-ip
        run: |
          TASK_ARN=$(aws ecs list-tasks --cluster $ECS_CLUSTER --service-name $ECS_SERVICE --desired-status RUNNING --query 'taskArns[0]' --output text --region $AWS_REGION)
          ENI_ID=$(aws ecs describe-tasks --cluster $ECS_CLUSTER --tasks $TASK_ARN --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' --output text --region $AWS_REGION)
          PUBLIC_IP=$(aws ec2 describe-network-interfaces --network-interface-ids $ENI_ID --query 'NetworkInterfaces[0].Association.PublicIp' --output text --region $AWS_REGION)
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT

      - name: Update CloudFront origin
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          NEW_IP=${{ steps.get-ip.outputs.public_ip }}
          CONFIG=$(aws cloudfront get-distribution-config --id $CLOUDFRONT_DISTRIBUTION_ID)
          ETAG=$(echo $CONFIG | jq -r '.ETag')

          UPDATED_CONFIG=$(echo $CONFIG | jq --arg ip "$NEW_IP" '.DistributionConfig | .Origins.Items[0].DomainName = $ip')

          aws cloudfront update-distribution \
            --id $CLOUDFRONT_DISTRIBUTION_ID \
            --if-match $ETAG \
            --distribution-config "$UPDATED_CONFIG"
