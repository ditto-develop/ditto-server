spring:
  application:
    name: ditto-server
  profiles:
    active: local
    include:
      - oauth
      - db

server:
  port: 8080
  shutdown: graceful

ditto:
  security:
    api-key: local-dev-key
  jwt:
    secret: local-dev-jwt-secret-key-must-be-at-least-256-bits-long-for-hmac-sha
    expiration-ms: 3600000
