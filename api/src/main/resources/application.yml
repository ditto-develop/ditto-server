spring:
  application:
    name: ditto-server
  profiles:
    active: local
    include:
      - oauth
      - db

server:
  port: 8080
  shutdown: graceful

springdoc:
  swagger-ui:
    path: /docs
    url: /docs/openapi.yaml

ditto:
  security:
    api-key: test-api-key
  jwt:
    secret: local-dev-jwt-secret-key-must-be-at-least-256-bits-long-for-hmac-sha
    expiration-ms: 3600000
