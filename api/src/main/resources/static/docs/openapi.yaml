openapi: 3.0.1
info:
  title: Ditto API
  description: |-
    Ditto 서비스 API 문서입니다.

    ## 인증
    모든 API 요청에는 `X-API-Key` 헤더가 필요합니다.
    API Key는 백엔드 담당자에게 발급받으세요.

    ```
    X-API-Key: <발급받은 API Key>
    ```

    Swagger UI에서 테스트하려면 우측 상단의 **Authorize** 버튼을 클릭하고 API Key를 입력하세요.
  version: v1
servers:
- url: https://api.ditto.pics
tags: []
paths:
  /health:
    get:
      tags:
      - System
      summary: 헬스 체크
      description: 서버 상태를 확인합니다.
      operationId: health-check
      responses:
        "200":
          description: "200"
          content:
            text/plain;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/health486549215"
              examples:
                health-check:
                  value: OK
components:
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API 인증 키. 백엔드 담당자에게 발급받으세요.
  schemas:
    health486549215:
      type: object

security:
- ApiKey: []
