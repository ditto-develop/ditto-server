openapi: 3.0.1
info:
  title: Ditto API
  description: |-
    Ditto 서비스 API 문서입니다.

    ## 인증
    모든 API 요청에는 `X-API-Key` 헤더가 필요합니다.
    API Key는 백엔드 담당자에게 발급받으세요.

    ```
    X-API-Key: <발급받은 API Key>
    ```

    Swagger UI에서 테스트하려면 우측 상단의 **Authorize** 버튼을 클릭하고 API Key를 입력하세요.
  version: v1
servers:
- url: ""
tags: []
paths:
  /api/v1/users:
    post:
      tags:
      - Users
      summary: 회원가입
      description: 소셜 로그인 후 추가 정보를 입력하여 회원가입을 완료합니다.
      operationId: user-register
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-v1-users-1422985128"
            examples:
              user-register:
                value: |-
                  {
                    "name" : "김철수",
                    "nickname" : "철수123",
                    "phoneNumber" : "010-1234-5678",
                    "email" : null,
                    "gender" : "MALE",
                    "age" : 25,
                    "birthDate" : null,
                    "provider" : "KAKAO",
                    "providerUserId" : "register-user"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-users-107230905"
              examples:
                user-register:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "id" : 1,
                        "name" : "김철수",
                        "nickname" : "철수123",
                        "phoneNumber" : "010-1234-5678",
                        "email" : null,
                        "gender" : "MALE",
                        "age" : 25,
                        "birthDate" : null,
                        "joinedAt" : "2026-05-01 16:59:26",
                        "role" : null,
                        "createdAt" : "2026-05-01 16:59:26",
                        "updatedAt" : "2026-05-01 16:59:26"
                      },
                      "error" : null
                    }
  /api/v1/quiz-progress/answers:
    post:
      tags:
      - QuizProgress
      summary: 퀴즈 답안 제출
      description: 퀴즈에 대한 답안을 제출합니다. 이미 답변한 퀴즈에 재제출하면 선택지가 업데이트됩니다.
      operationId: quiz-progress-submit-answer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/api-v1-quiz-progress-answers-1062387050"
            examples:
              quiz-progress-submit-answer:
                value: |-
                  {
                    "quizId" : 1,
                    "choiceId" : 2
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-quiz-progress-reset-1831456372"
              examples:
                quiz-progress-submit-answer:
                  value: |-
                    {
                      "success" : true,
                      "data" : null,
                      "error" : null
                    }
  /api/v1/quiz-progress/current:
    get:
      tags:
      - QuizProgress
      summary: 퀴즈 진행률 조회
      description: 현재 주차의 퀴즈 진행 상태를 조회합니다.
      operationId: quiz-progress-current
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-quiz-progress-current1012077415"
              examples:
                quiz-progress-current:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "status" : "COMPLETED",
                        "quizSetId" : 1,
                        "quizSetTitle" : "테스트 퀴즈셋",
                        "totalQuizzes" : 1,
                        "answeredQuizzes" : 1,
                        "participantCount" : 1
                      },
                      "error" : null
                    }
  /api/v1/quiz-progress/reset:
    post:
      tags:
      - QuizProgress
      summary: 퀴즈 진행 초기화
      description: 이번 주차의 퀴즈 답변과 진행 상태를 모두 초기화합니다.
      operationId: quiz-progress-reset
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-quiz-progress-reset-1831456372"
              examples:
                quiz-progress-reset:
                  value: |-
                    {
                      "success" : true,
                      "data" : null,
                      "error" : null
                    }
  /api/v1/quiz-sets/current-week:
    get:
      tags:
      - QuizSet
      summary: 이번 주차 퀴즈 세트 조회
      description: 현재 활성화된 이번 주차의 퀴즈 세트를 퀴즈 목록과 함께 조회합니다.
      operationId: quiz-set-current-week
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-quiz-sets-current-week-523790867"
              examples:
                quiz-set-current-week:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "year" : 2026,
                        "month" : 5,
                        "week" : 1,
                        "quizSets" : [ {
                          "id" : 1,
                          "year" : 2026,
                          "month" : 4,
                          "week" : 2,
                          "category" : "성격",
                          "title" : "이번 주 1:1 매칭",
                          "description" : "테스트 퀴즈 세트 설명",
                          "startDate" : "2026-04-30 16:59:25",
                          "endDate" : "2026-05-02 16:59:25",
                          "isActive" : true,
                          "matchingType" : "ONE_TO_ONE",
                          "quizzes" : [ {
                            "id" : 1,
                            "question" : "짜장면 vs 짬뽕?",
                            "quizSetId" : 1,
                            "choices" : [ {
                              "id" : 1,
                              "content" : "짜장면",
                              "order" : 1
                            }, {
                              "id" : 2,
                              "content" : "짬뽕",
                              "order" : 2
                            } ],
                            "order" : 1,
                            "createdAt" : "2026-05-01 16:59:25",
                            "updatedAt" : "2026-05-01 16:59:25"
                          } ]
                        } ]
                      },
                      "error" : null
                    }
      security:
      - bearerAuthJWT: []
  /api/v1/quiz-sets/{id}:
    get:
      tags:
      - QuizSet
      summary: 퀴즈 세트 단건 조회
      description: ID로 퀴즈 세트 메타데이터를 조회합니다.
      operationId: quiz-set-get
      parameters:
      - name: id
        in: path
        description: ""
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-quiz-sets-id1440540832"
              examples:
                quiz-set-get:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "id" : 1,
                        "year" : 2026,
                        "month" : 4,
                        "week" : 2,
                        "category" : "성격",
                        "title" : "이번 주 1:1 매칭",
                        "description" : "테스트 퀴즈 세트 설명",
                        "startDate" : "2026-04-06 00:00:00",
                        "endDate" : "2026-04-12 23:59:59",
                        "isActive" : true,
                        "matchingType" : "ONE_TO_ONE",
                        "createdAt" : "2026-05-01 16:59:26",
                        "updatedAt" : "2026-05-01 16:59:26"
                      },
                      "error" : null
                    }
      security:
      - bearerAuthJWT: []
  /api/v1/quiz-progress/quiz-sets/{id}:
    get:
      tags:
      - QuizProgress
      summary: 퀴즈셋 + 답변 조회
      description: 퀴즈셋의 문제 목록과 사용자의 답변을 함께 조회합니다. 이어풀기에 사용됩니다.
      operationId: quiz-progress-quiz-set-with-progress
      parameters:
      - name: id
        in: path
        description: ""
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-quiz-progress-quiz-sets-id-1569645469"
              examples:
                quiz-progress-quiz-set-with-progress:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "quizzes" : [ {
                          "id" : 1,
                          "question" : "첫번째",
                          "quizSetId" : 1,
                          "choices" : [ {
                            "id" : 1,
                            "content" : "A",
                            "order" : 1
                          }, {
                            "id" : 2,
                            "content" : "B",
                            "order" : 2
                          } ],
                          "order" : 1,
                          "createdAt" : "2026-01-01 00:00:00",
                          "updatedAt" : "2026-01-01 00:00:00",
                          "userAnswer" : 1
                        }, {
                          "id" : 2,
                          "question" : "두번째",
                          "quizSetId" : 1,
                          "choices" : [ {
                            "id" : 3,
                            "content" : "C",
                            "order" : 1
                          }, {
                            "id" : 4,
                            "content" : "D",
                            "order" : 2
                          } ],
                          "order" : 2,
                          "createdAt" : "2026-01-01 00:00:00",
                          "updatedAt" : "2026-01-01 00:00:00",
                          "userAnswer" : null
                        } ],
                        "totalCount" : 2
                      },
                      "error" : null
                    }
  /api/v1/users/auth/logout:
    post:
      tags:
      - Auth
      summary: 로그아웃
      description: 액세스 토큰의 회원 정보로 모든 리프레시 토큰을 삭제합니다.
      operationId: logout
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-quiz-progress-reset-1831456372"
              examples:
                logout:
                  value: |-
                    {
                      "success" : true,
                      "data" : null,
                      "error" : null
                    }
      security:
      - bearerAuthJWT: []
  /api/v1/users/auth/refresh:
    post:
      tags:
      - Auth
      summary: 토큰 갱신
      description: 리프레시 토큰으로 새로운 액세스 토큰과 리프레시 토큰을 발급합니다.
      operationId: token-refresh
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-v1-users-auth-refresh1056639717"
            examples:
              token-refresh:
                value: |-
                  {
                    "refreshToken" : "7127eacb-a95e-4650-8d80-aa95bcdd1501"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-users-auth-refresh-42454406"
              examples:
                token-refresh:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "accessToken" : "eyJhbGciOiJIUzUxMiJ9.eyJzdWIiOiIxIiwiaWF0IjoxNzc3NjIyMzY0LCJleHAiOjE3Nzc2MjU5NjR9.IT7EKgI_2kG8NlOeL9lRyLQBYLVqSZyU0NLTD97gLqVQ_wvK1HtFHHanV-uV35KY_-vIvd_G5_B_oPQMaumHmg",
                        "refreshToken" : "c7fe58b3-baf6-4c4d-9e8c-925008bbf12e"
                      },
                      "error" : null
                    }
  /api/v1/users/social-login/{provider}:
    get:
      tags:
      - OAuth
      summary: 소셜 로그인
      description: 소셜 로그인 제공자의 인가 페이지로 리다이렉트합니다.
      operationId: oauth-login
      parameters:
      - name: provider
        in: path
        description: 소셜 로그인 제공자 (KAKAO)
        required: true
        schema:
          type: string
      responses:
        "302":
          description: "302"
  /api/v1/users/{id}/leave:
    post:
      tags:
      - Users
      summary: 회원 탈퇴
      description: 회원을 탈퇴 처리합니다.
      operationId: user-leave
      parameters:
      - name: id
        in: path
        description: 사용자 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-users-id-leave-1444522536"
              examples:
                user-leave:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "id" : 1,
                        "name" : null,
                        "nickname" : "탈퇴유저",
                        "phoneNumber" : null,
                        "email" : null,
                        "gender" : null,
                        "age" : null,
                        "birthDate" : null,
                        "joinedAt" : null,
                        "role" : null,
                        "createdAt" : "2026-05-01 16:59:26",
                        "updatedAt" : "2026-05-01 16:59:26"
                      },
                      "error" : null
                    }
      security:
      - bearerAuthJWT: []
  /api/v1/users/nickname/{nickname}/availability:
    get:
      tags:
      - Users
      summary: 닉네임 중복 확인
      description: 닉네임이 사용 가능한지 확인합니다.
      operationId: nickname-availability
      parameters:
      - name: nickname
        in: path
        description: 확인할 닉네임
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-users-nickname-nickname-availability-125958969"
              examples:
                nickname-availability:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "available" : true
                      },
                      "error" : null
                    }
  /api/v1/users/social-login/{provider}/callback:
    get:
      tags:
      - OAuth
      summary: 소셜 로그인 콜백
      description: 신규 사용자는 토큰을 발급하지 않습니다. 회원가입이 필요합니다.
      operationId: oauth-callback-new-user
      parameters:
      - name: provider
        in: path
        description: 소셜 로그인 제공자 (KAKAO)
        required: true
        schema:
          type: string
      - name: code
        in: query
        description: 소셜 로그인 제공자로부터 받은 인가 코드
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-users-social-login-provider-callback1248644946"
              examples:
                oauth-callback-new-user:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "accessToken" : null,
                        "refreshToken" : null
                      },
                      "error" : null
                    }
components:
  schemas:
    api-v1-users-auth-refresh-42454406:
      required:
      - error
      - success
      type: object
      properties:
        data:
          required:
          - accessToken
          - refreshToken
          type: object
          properties:
            accessToken:
              type: string
              description: 새 JWT 액세스 토큰
            refreshToken:
              type: string
              description: 새 리프레시 토큰
        success:
          type: boolean
          description: 성공 여부
    api-v1-quiz-sets-current-week-523790867:
      required:
      - error
      - success
      type: object
      properties:
        data:
          required:
          - month
          - week
          - year
          type: object
          properties:
            week:
              type: number
              description: 주차
            month:
              type: number
              description: 월
            year:
              type: number
              description: 년도
            quizSets:
              type: array
              items:
                required:
                - category
                - description
                - endDate
                - id
                - isActive
                - matchingType
                - month
                - startDate
                - title
                - week
                - year
                type: object
                properties:
                  week:
                    type: number
                    description: 주차
                  month:
                    type: number
                    description: 월
                  endDate:
                    type: string
                    description: 종료일시
                  year:
                    type: number
                    description: 년도
                  description:
                    type: string
                    description: 퀴즈 세트 설명
                  quizzes:
                    type: array
                    items:
                      required:
                      - createdAt
                      - id
                      - order
                      - question
                      - quizSetId
                      - updatedAt
                      type: object
                      properties:
                        createdAt:
                          type: string
                          description: 생성일시
                        question:
                          type: string
                          description: 퀴즈 질문
                        quizSetId:
                          type: number
                          description: 퀴즈 세트 ID
                        id:
                          type: number
                          description: 퀴즈 ID
                        choices:
                          type: array
                          items:
                            required:
                            - content
                            - id
                            - order
                            type: object
                            properties:
                              id:
                                type: number
                                description: 선택지 ID
                              content:
                                type: string
                                description: 선택지 내용
                              order:
                                type: number
                                description: 선택지 순서
                        updatedAt:
                          type: string
                          description: 수정일시
                        order:
                          type: number
                          description: 퀴즈 순서
                  id:
                    type: number
                    description: 퀴즈 세트 ID
                  isActive:
                    type: boolean
                    description: 활성화 여부
                  title:
                    type: string
                    description: 퀴즈 세트 제목
                  category:
                    type: string
                    description: 카테고리
                  matchingType:
                    type: string
                    description: "매칭 타입 (ONE_TO_ONE, GROUP)"
                  startDate:
                    type: string
                    description: 시작일시
        success:
          type: boolean
          description: 성공 여부
    api-v1-quiz-progress-quiz-sets-id-1569645469:
      required:
      - error
      - success
      type: object
      properties:
        data:
          required:
          - totalCount
          type: object
          properties:
            quizzes:
              type: array
              items:
                required:
                - createdAt
                - id
                - order
                - question
                - quizSetId
                - updatedAt
                type: object
                properties:
                  createdAt:
                    type: string
                    description: 생성일시
                  userAnswer:
                    type: number
                    description: 사용자가 선택한 choiceId (미답변 시 null)
                    nullable: true
                  question:
                    type: string
                    description: 퀴즈 질문
                  quizSetId:
                    type: number
                    description: 퀴즈 세트 ID
                  id:
                    type: number
                    description: 퀴즈 ID
                  choices:
                    type: array
                    items:
                      required:
                      - content
                      - id
                      - order
                      type: object
                      properties:
                        id:
                          type: number
                          description: 선택지 ID
                        content:
                          type: string
                          description: 선택지 내용
                        order:
                          type: number
                          description: 선택지 순서
                  updatedAt:
                    type: string
                    description: 수정일시
                  order:
                    type: number
                    description: 퀴즈 순서
            totalCount:
              type: number
              description: 전체 퀴즈 수
        success:
          type: boolean
          description: 성공 여부
    api-v1-quiz-progress-current1012077415:
      required:
      - error
      - success
      type: object
      properties:
        data:
          required:
          - participantCount
          - status
          type: object
          properties:
            answeredQuizzes:
              type: number
              description: 답변한 퀴즈 수
              nullable: true
            totalQuizzes:
              type: number
              description: 전체 퀴즈 수
              nullable: true
            quizSetId:
              type: number
              description: 참여 중인 퀴즈 세트 ID
              nullable: true
            participantCount:
              type: number
              description: 완료한 참여자 수
            quizSetTitle:
              type: string
              description: 참여 중인 퀴즈 세트 제목
              nullable: true
            status:
              type: string
              description: "진행 상태 (NOT_STARTED, IN_PROGRESS, COMPLETED)"
        success:
          type: boolean
          description: 성공 여부
    api-v1-users-1422985128:
      required:
      - provider
      - providerUserId
      type: object
      properties:
        phoneNumber:
          type: string
          description: 전화번호 (010-0000-0000)
          nullable: true
        gender:
          type: string
          description: "성별 (MALE, FEMALE)"
          nullable: true
        provider:
          type: string
          description: 소셜 로그인 제공자 (KAKAO)
        nickname:
          type: string
          description: "닉네임 (2~10자, 한글·영문·숫자)"
          nullable: true
        name:
          type: string
