openapi: 3.0.1
info:
  title: Ditto API
  description: |-
    Ditto 서비스 API 문서입니다.

    ## 인증
    모든 API 요청에는 `X-API-Key` 헤더가 필요합니다.
    API Key는 백엔드 담당자에게 발급받으세요.

    ```
    X-API-Key: <발급받은 API Key>
    ```

    Swagger UI에서 테스트하려면 우측 상단의 **Authorize** 버튼을 클릭하고 API Key를 입력하세요.
  version: v1
servers:
- url: ""
tags: []
paths:
  /api/v1/users/social-login/{provider}:
    get:
      tags:
      - OAuth
      summary: 소셜 로그인
      description: 소셜 로그인 제공자의 인가 페이지로 리다이렉트합니다.
      operationId: oauth-login
      parameters:
      - name: provider
        in: path
        description: 소셜 로그인 제공자 (KAKAO)
        required: true
        schema:
          type: string
      responses:
        "302":
          description: "302"
  /api/v1/users/social-login/{provider}/callback:
    get:
      tags:
      - OAuth
      summary: 소셜 로그인 콜백
      description: 소셜 로그인 제공자로부터 받은 인가 코드로 JWT를 발급합니다.
      operationId: oauth-callback
      parameters:
      - name: provider
        in: path
        description: 소셜 로그인 제공자 (KAKAO)
        required: true
        schema:
          type: string
      - name: code
        in: query
        description: 소셜 로그인 제공자로부터 받은 인가 코드
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-users-social-login-provider-callback1901578569"
              examples:
                oauth-callback:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "accessToken" : "eyJhbGciOiJIUzUxMiJ9.eyJzdWIiOiIxIiwiaWF0IjoxNzc0NjA1NTU4LCJleHAiOjE3NzQ2MDkxNTh9.LAIu9oHr7wCjctHUDsc-x9qe77EpXFHvHPpoEMS7KZb04uyIQcnpAcg5U_sAGFeCIhh86vXG8CBq-5xnJXlCIg"
                      },
                      "error" : null
                    }
  /health:
    get:
      tags:
      - System
      summary: 헬스 체크
      description: 서버 상태를 확인합니다.
      operationId: health-check
      responses:
        "200":
          description: "200"
          content:
            text/plain;charset=UTF-8:
              schema:
                $ref: "#/components/schemas/health486549215"
              examples:
                health-check:
                  value: OK
components:
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API 인증 키. 백엔드 담당자에게 발급받으세요.
  schemas:
    api-v1-users-social-login-provider-callback1901578569:
      required:
      - error
      - success
      type: object
      properties:
        data:
          required:
          - accessToken
          type: object
          properties:
            accessToken:
              type: string
              description: JWT 액세스 토큰
        success:
          type: boolean
          description: 성공 여부
    health486549215:
      type: object

security:
- ApiKey: []
