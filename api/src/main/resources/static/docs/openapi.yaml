openapi: 3.0.1
info:
  title: Ditto API
  description: |-
    Ditto 서비스 API 문서입니다.

    ## 인증
    모든 API 요청에는 `X-API-Key` 헤더가 필요합니다.
    API Key는 백엔드 담당자에게 발급받으세요.

    ```
    X-API-Key: <발급받은 API Key>
    ```

    Swagger UI에서 테스트하려면 우측 상단의 **Authorize** 버튼을 클릭하고 API Key를 입력하세요.
  version: v1
servers:
- url: ""
tags: []
paths:
  /api/v1/users/auth/logout:
    post:
      tags:
      - Auth
      summary: 로그아웃
      description: 액세스 토큰의 회원 정보로 모든 리프레시 토큰을 삭제합니다.
      operationId: logout
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-users-auth-logout-1831456372"
              examples:
                logout:
                  value: |-
                    {
                      "success" : true,
                      "data" : null,
                      "error" : null
                    }
      security:
      - bearerAuthJWT: []
  /api/v1/users/auth/refresh:
    post:
      tags:
      - Auth
      summary: 토큰 갱신
      description: 리프레시 토큰으로 새로운 액세스 토큰과 리프레시 토큰을 발급합니다.
      operationId: token-refresh
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: "#/components/schemas/api-v1-users-auth-refresh1056639717"
            examples:
              token-refresh:
                value: |-
                  {
                    "refreshToken" : "b76975a5-5fe8-4f7f-8fba-8741e49b4b19"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-users-auth-refresh-42454406"
              examples:
                token-refresh:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "accessToken" : "eyJhbGciOiJIUzUxMiJ9.eyJzdWIiOiJwcm92aWRlclVzZXJJZCIsInByb3ZpZGVyIjoiS0FLQU8iLCJpYXQiOjE3NzU1NDE5MTAsImV4cCI6MTc3NTU0NTUxMH0.C7VIaiU_4m8CQCCB6tI0szx2FsdPwSEcKrfy7--EUCSYLiob8GwtY91-cO0YjxB_FTOLC-IDDHr-KJBODF5EVA",
                        "refreshToken" : "1079e4e3-0fa5-4c2b-ac91-3e19036b9726"
                      },
                      "error" : null
                    }
  /api/v1/users/social-login/{provider}:
    get:
      tags:
      - OAuth
      summary: 소셜 로그인
      description: 소셜 로그인 제공자의 인가 페이지로 리다이렉트합니다.
      operationId: oauth-login
      parameters:
      - name: provider
        in: path
        description: 소셜 로그인 제공자 (KAKAO)
        required: true
        schema:
          type: string
      responses:
        "302":
          description: "302"
  /api/v1/users/social-login/{provider}/callback:
    get:
      tags:
      - OAuth
      summary: 소셜 로그인 콜백
      description: 신규 사용자는 토큰을 발급하지 않습니다. 회원가입이 필요합니다.
      operationId: oauth-callback
      parameters:
      - name: provider
        in: path
        description: 소셜 로그인 제공자 (KAKAO)
        required: true
        schema:
          type: string
      - name: code
        in: query
        description: 소셜 로그인 제공자로부터 받은 인가 코드
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/api-v1-users-social-login-provider-callback1685114549"
              examples:
                oauth-callback-new-user:
                  value: |-
                    {
                      "success" : true,
                      "data" : { },
                      "error" : null
                    }
                oauth-callback:
                  value: |-
                    {
                      "success" : true,
                      "data" : {
                        "accessToken" : "eyJhbGciOiJIUzUxMiJ9.eyJzdWIiOiIxMjM0NSIsInByb3ZpZGVyIjoiS0FLQU8iLCJpYXQiOjE3NzQ5Mzk3MTcsImV4cCI6MTc3NDk0MzMxN30.JyttZNZe03omDRMBg0ZqwOyU-ndwdYP-RbqGN3idW8XcxY4NOxqD8VQnq6k2jaM6mwKYDRGrMVPyfOJ_iNM5qQ",
                        "refreshToken" : "397ea348-f690-435d-999e-fd5ad6a56332"
                      },
                      "error" : null
                    }
components:
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API 인증 키. 백엔드 담당자에게 발급받으세요.
    bearerAuthJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    api-v1-users-auth-refresh-42454406:
      required:
      - error
      - success
      type: object
      properties:
        data:
          required:
          - accessToken
          - refreshToken
          type: object
          properties:
            accessToken:
              type: string
              description: 새 JWT 액세스 토큰
            refreshToken:
              type: string
              description: 새 리프레시 토큰
        success:
          type: boolean
          description: 성공 여부
    api-v1-users-social-login-provider-callback1685114549:
      required:
      - data
      - error
      - success
      type: object
      properties:
        data:
          required:
          - accessToken
          - refreshToken
          type: object
          properties:
            accessToken:
              type: string
              description: JWT 액세스 토큰
            refreshToken:
              type: string
              description: 리프레시 토큰
          description: 빈 객체 (신규 사용자)
        success:
          type: boolean
          description: 성공 여부
    api-v1-users-auth-logout-1831456372:
      required:
      - data
      - error
      - success
      type: object
      properties:
        success:
          type: boolean
          description: 성공 여부
    api-v1-users-auth-refresh1056639717:
      required:
      - refreshToken
      type: object
      properties:
        refreshToken:
          type: string
          description: 리프레시 토큰

security:
- ApiKey: []
