spring:
  datasource:
    url: jdbc:h2:mem:ditto;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

ditto:
  security:
    api-key: test-api-key
  oauth:
    kakao:
      client-id: test-kakao-client-id
      client-secret: test-kakao-client-secret
      redirect-uri: http://localhost:8080/oauth/kakao/callback
  jwt:
    secret: test-jwt-secret-key-must-be-at-least-256-bits-long-for-hmac-sha-testing
    expiration-ms: 3600000
